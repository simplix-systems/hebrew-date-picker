<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hebrew Date Picker · Playground</title>
  <meta name="description" content="Interactive playground for @simplix-systems/hebrew-date-picker — a Hebrew & Gregorian date picker." />
  <link rel="stylesheet" href="../dist/hebrew-datepicker.css" />
  <style>
    :root {
      --bg: #eef1f7;
      --card: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --heading: #374151;
      --brand: #4c5fd8;
      --brand-2: #7c3aed;
      --brand-soft: rgba(76, 95, 216, .12);
      --code-bg: #0f172a;
      --code-fg: #e2e8f0;
      --shadow: 0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.06);
    }
    :root[data-theme="dark"] {
      --bg: #0b1020; --card: #141a2e; --border: #26304a; --text: #e5e7eb;
      --muted: #9aa4b8; --heading: #cbd5e1; --brand-soft: rgba(124,58,237,.20);
      --code-bg: #0a0f1e; --shadow: 0 1px 2px rgba(0,0,0,.3), 0 10px 30px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: system-ui, "Segoe UI", Arial, sans-serif;
      background: var(--bg); color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ---------- Header ---------- */
    header {
      background: linear-gradient(120deg, var(--brand), var(--brand-2));
      color: #fff; padding: 26px 24px 30px;
    }
    .head-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .head-text { flex: 1 1 260px; min-width: 0; }
    header h1 { margin: 0 0 4px; font-size: 24px; font-weight: 800; display: flex; align-items: center; gap: 10px; letter-spacing: -.01em; }
    header p { margin: 0; opacity: .92; font-size: 13.5px; }
    header a { color: #fff; text-decoration: underline; text-underline-offset: 2px; font-weight: 600; }
    .hicon { width: 1em; height: 1em; vertical-align: -.15em; display: inline-block; }
    .head-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .lang-switch { display: inline-flex; background: rgba(255,255,255,.16); border-radius: 999px; padding: 3px; }
    .lang-switch button {
      border: 0; background: transparent; color: #fff; font: inherit; font-weight: 700; font-size: 13px;
      padding: 6px 14px; border-radius: 999px; cursor: pointer; opacity: .8; transition: .15s;
    }
    .lang-switch button.active { background: #fff; color: var(--brand); opacity: 1; }
    .lang-switch button.ico-btn { padding: 7px 11px; display: inline-flex; align-items: center; }
    .ico { width: 16px; height: 16px; display: block; }
    .gh-link {
      display: inline-flex; align-items: center; gap: 7px; background: rgba(255,255,255,.16);
      color: #fff; text-decoration: none; font-weight: 600; font-size: 13px; padding: 8px 14px; border-radius: 999px;
    }
    .gh-link:hover { background: rgba(255,255,255,.26); }

    /* ---------- Layout ---------- */
    main { max-width: 1100px; margin: -12px auto 40px; padding: 0 24px; display: grid; gap: 22px; grid-template-columns: 340px 1fr; align-items: start; }
    @media (max-width: 820px) { main { grid-template-columns: 1fr; } }

    .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; box-shadow: var(--shadow); }
    .controls { padding: 18px; position: sticky; top: 20px; max-height: calc(85vh); overflow-y: auto; }
    @media (max-width: 820px) { .controls { position: static; max-height: none; } }
    .controls h2 { margin: 0 0 4px; font-size: 15px; }
    .controls .hint { margin: 0 0 14px; font-size: 12px; color: var(--muted); }
    .row { margin-bottom: 15px; }
    .row > label.title { display: block; font-size: 12px; font-weight: 700; color: var(--heading); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .03em; }

    .seg { display: inline-flex; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; flex-wrap: wrap; background: var(--card); }
    .seg label { font-size: 12.5px; cursor: pointer; }
    .seg input { position: absolute; opacity: 0; pointer-events: none; }
    .seg span { display: inline-block; padding: 7px 12px; color: var(--muted); transition: .12s; }
    .seg label:hover span { color: var(--text); }
    .seg input:checked + span { background: var(--brand); color: #fff; }

    .chk { display: flex; align-items: center; gap: 8px; font-size: 13.5px; margin: 7px 0; cursor: pointer; }
    .chk input { width: 16px; height: 16px; accent-color: var(--brand); }
    .divider { height: 1px; background: var(--border); margin: 16px 0; }

    input[type=color] { width: 42px; height: 30px; border: 1px solid var(--border); border-radius: 7px; padding: 0; cursor: pointer; vertical-align: middle; background: var(--card); }

    /* ---------- Stage ---------- */
    .stage { padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 16px; min-height: 160px; min-width: 0; position: sticky; top: 20px; max-height: calc(85vh); overflow-y: auto; }
    @media (max-width: 820px) { .stage { position: static; max-height: none; } }
    .stage-picker { display: flex; justify-content: center; width: 100%; }
    .out { font-size: 14px; color: var(--heading); background: var(--bg); border-radius: 10px; padding: 11px 15px; width: 100%; text-align: center; }
    .out b { color: var(--brand); font-variant-numeric: tabular-nums; }
    .snippet-wrap { width: 100%; min-width: 0; }
    .snippet-bar { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
    .snippet-bar select { font: inherit; font-size: 12.5px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--text); cursor: pointer; }
    .snippet-bar #copyBtn { margin-inline-start: auto; font: inherit; font-size: 12.5px; font-weight: 600; padding: 6px 14px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); color: var(--heading); cursor: pointer; transition: .12s; }
    .snippet-bar #copyBtn:hover { border-color: var(--brand); color: var(--brand); }
    .snippet-bar #copyBtn.copied { background: var(--brand); color: #fff; border-color: var(--brand); }
    code.snippet { display: block; width: 100%; max-height: 300px; background: var(--code-bg); color: var(--code-fg); border-radius: 10px; padding: 14px; font-size: 12px; white-space: pre; overflow: auto; line-height: 1.6; direction: ltr; text-align: left; font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; }

    /* ---------- Date input (showInput mode) ---------- */
    .di-wrap { position: relative; width: 290px; max-width: 100%; }
    .di-input { width: 100%; font: inherit; font-size: 15px; padding: 11px 40px 11px 36px; border: 1px solid var(--border); border-radius: 10px; background: var(--card); color: var(--text); }
    .di-input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
    .di-input[readonly] { cursor: pointer; }
    .di-cal { position: absolute; inset-inline-start: 12px; top: 50%; transform: translateY(-50%); font-size: 17px; opacity: .6; cursor: pointer; }
    .di-cal:hover { opacity: .9; }
    .di-clear { position: absolute; inset-inline-end: 9px; top: 50%; transform: translateY(-50%); border: none; background: var(--border); color: var(--heading); width: 21px; height: 21px; border-radius: 50%; cursor: pointer; font-size: 12px; line-height: 1; display: none; }
    .di-clear.show { display: inline-flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <header>
    <div class="head-inner">
      <div class="head-text">
        <h1><svg class="hicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> <span data-i18n="title">Hebrew Date Picker</span></h1>

          GitHub

        <div class="lang-switch" role="group" aria-label="Theme">
          <button type="button" class="ico-btn" data-theme-btn="light" title="Light" aria-label="Light">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M6.3 17.7l-1.4 1.4M19.1 4.9l-1.4 1.4"/></svg>

            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>

        <div class="lang-switch" role="group" aria-label="Language">
          <button type="button" data-lang="he" class="active">עברית</button>
          <button type="button" data-lang="en">English</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <section class="card controls">
      <h2 data-i18n="settings">Settings (Props)</h2>
      <p class="hint" data-i18n="settingsHint">Every change re-renders the picker in real time.</p>

      <div class="row"><label class="title" data-i18n="p_calendar">calendar</label>
        <div class="seg">
          <label><input type="radio" name="calendar" value="hebrew" checked /><span data-i18n="o_hebrew">Hebrew</span></label>
          <label><input type="radio" name="calendar" value="gregorian" /><span data-i18n="o_gregorian">Gregorian</span></label>
        </div>
      </div>

      <div class="row"><label class="title" data-i18n="p_mode">mode</label>
        <div class="seg">
          <label><input type="radio" name="mode" value="single" checked /><span data-i18n="o_single">single</span></label>
          <label><input type="radio" name="mode" value="range" /><span data-i18n="o_range">range</span></label>
        </div>
      </div>

      <div class="row"><label class="title" data-i18n="p_precision">precision</label>
        <div class="seg">
          <label><input type="radio" name="precision" value="day" checked /><span data-i18n="o_day">day</span></label>
          <label><input type="radio" name="precision" value="month" /><span data-i18n="o_month">month</span></label>
          <label><input type="radio" name="precision" value="year" /><span data-i18n="o_year">year</span></label>
        </div>
      </div>

      <div class="row"><label class="title" data-i18n="p_size">size</label>
        <div class="seg">
          <label><input type="radio" name="size" value="sm" /><span>sm</span></label>
          <label><input type="radio" name="size" value="md" checked /><span>md</span></label>
          <label><input type="radio" name="size" value="lg" /><span>lg</span></label>
        </div>
      </div>

      <div class="row"><label class="title" data-i18n="p_theme">theme</label>
        <div class="seg">
          <label><input type="radio" name="theme" value="light" /><span data-i18n="o_light">light</span></label>
          <label><input type="radio" name="theme" value="dark" /><span data-i18n="o_dark">dark</span></label>
          <label><input type="radio" name="theme" value="auto" checked /><span data-i18n="o_auto">auto</span></label>
        </div>
      </div>

      <div class="row"><label class="title" data-i18n="p_color">primaryColor</label>
        <input type="color" id="primaryColor" value="#4c5fd8" />
        <label class="chk" style="display:inline-flex; margin-inline-start:10px;"><input type="checkbox" id="usecolor" /> <span data-i18n="useColor">use color</span></label>
      </div>

      <div class="divider"></div>

      <div class="row"><label class="title" data-i18n="s_display">Display mode</label>
        <label class="chk"><input type="checkbox" id="showInput" /> <span data-i18n="showInput">showInput (popup from an input)</span></label>
        <div class="seg" style="margin:8px 0;">
          <label><input type="radio" name="displayCalendar" value="hebrew" checked /><span data-i18n="disp_hebrew">Hebrew display</span></label>
          <label><input type="radio" name="displayCalendar" value="gregorian" /><span data-i18n="disp_gregorian">Gregorian display</span></label>
        </div>
        <label class="chk"><input type="checkbox" id="closeOnSelect" checked /> <span>closeOnSelect</span></label>
        <label class="chk"><input type="checkbox" id="openOnInputClick" checked /> <span data-i18n="openOnInput">openOnInputClick</span></label>
      </div>

      <div class="divider"></div>

      <div class="row"><label class="title" data-i18n="p_range">min / max</label>
        <div style="display:flex; gap:8px; flex-wrap:wrap;">
          <label style="font-size:12px; color:var(--muted);"><span data-i18n="minLbl">min</span><br/><input type="date" id="minDate" style="font:inherit; font-size:13px; padding:5px 8px; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--text);" /></label>
          <label style="font-size:12px; color:var(--muted);"><span data-i18n="maxLbl">max</span><br/><input type="date" id="maxDate" style="font:inherit; font-size:13px; padding:5px 8px; border:1px solid var(--border); border-radius:8px; background:var(--card); color:var(--text);" /></label>
        </div>
      </div>

      <div class="divider"></div>

      <div class="row"><label class="title" data-i18n="s_info">Display &amp; info</label>
        <label class="chk"><input type="checkbox" id="highlightHolidays" checked /> <span data-i18n="c_holidays">highlightHolidays</span></label>
        <label class="chk"><input type="checkbox" id="highlightShabbat" checked /> <span data-i18n="c_shabbat">highlightShabbat</span></label>
        <label class="chk"><input type="checkbox" id="showParasha" checked /> <span data-i18n="c_parasha">showParasha</span></label>
        <label class="chk"><input type="checkbox" id="outsideDays" checked /> <span data-i18n="c_outside">outsideDays</span></label>
        <label class="chk"><input type="checkbox" id="diaspora" /> <span data-i18n="c_diaspora">diaspora</span></label>
        <label class="chk"><input type="checkbox" id="compact" /> <span data-i18n="c_compact">compact</span></label>
        <label class="chk"><input type="checkbox" id="rounded" /> <span data-i18n="c_rounded">rounded</span></label>
        <label class="chk"><input type="checkbox" id="headerBorder" checked /> <span data-i18n="c_headerBorder">headerBorder (frame the header buttons)</span></label>
      </div>

      <div class="divider"></div>

      <div class="row"><label class="title" data-i18n="s_time">Time</label>
        <label class="chk"><input type="checkbox" id="time" /> <span data-i18n="c_time">time (time picker)</span></label>
        <label class="chk"><input type="checkbox" id="seconds" /> <span data-i18n="c_seconds">seconds</span></label>
        <div class="seg" style="margin:8px 0;">
          <label><input type="radio" name="timeFormat" value="24" checked /><span>24h</span></label>
          <label><input type="radio" name="timeFormat" value="12" /><span>12h</span></label>
        </div>
        <div class="seg">
          <label><input type="radio" name="timeStyle" value="native" checked /><span data-i18n="ts_native">native</span></label>
          <label><input type="radio" name="timeStyle" value="dropdown" /><span>dropdown</span></label>
          <label><input type="radio" name="timeStyle" value="stepper" /><span>stepper</span></label>
          <label><input type="radio" name="timeStyle" value="clock" /><span data-i18n="ts_clock">clock</span></label>
        </div>
      </div>
    </section>

    <section class="card stage">
      <div class="stage-picker" id="stageInner"></div>
      <div class="out"><span data-i18n="result">Result</span>: <b id="out">—</b></div>
      <div class="snippet-wrap">
        <div class="snippet-bar">
          <select id="snippetLang" aria-label="Framework">
            <option value="core">Vanilla JS</option>
            <option value="vue">Vue</option>
            <option value="react">React</option>
            <option value="svelte">Svelte</option>
            <option value="angular">Angular</option>
            <option value="webcomponent">Web Component</option>
            <option value="filament">Filament (PHP)</option>
          </select>
          <button id="copyBtn" type="button" data-i18n="copy">Copy</button>
        </div>
        <code class="snippet" id="snippet"></code>
      </div>
    </section>
  </main>

  <script src="../dist/hebrew-datepicker.global.js"></script>
  <script>
    const H = HebrewDatePicker;

    /* ---------------- i18n ---------------- */

        o_light: 'בהיר', o_dark: 'כהה', o_auto: 'אוטו',
        s_display: 'מצב הצגה', showInput: 'showInput (לוח נפתח מאינפוט)', disp_hebrew: 'תצוגת עברי', disp_gregorian: 'תצוגת לועזי',

      },
      en: {

        p_calendar: 'calendar', p_mode: 'mode', p_precision: 'precision', p_size: 'size', p_theme: 'theme', p_color: 'primaryColor', useColor: 'use color',
        o_hebrew: 'Hebrew', o_gregorian: 'Gregorian', o_single: 'single', o_range: 'range', o_day: 'day', o_month: 'month', o_year: 'year',

        s_info: 'Display & info', c_holidays: 'highlightHolidays', c_shabbat: 'highlightShabbat', c_parasha: 'showParasha',
        c_outside: 'outsideDays', c_diaspora: 'diaspora', c_compact: 'compact', c_rounded: 'rounded', c_headerBorder: 'headerBorder (frame the header buttons)',
        s_time: 'Time', c_time: 'time (time picker)', c_seconds: 'seconds', ts_native: 'native', ts_clock: 'clock',
        result: 'Result', typed: 'typed', pasted: 'pasted', calWord: 'cal', rangeWord: 'range', clickToPick: 'Click to pick a date', clearTitle: 'Clear', copy: 'Copy', copied: 'Copied ✓',
        openOnInput: 'openOnInputClick', p_range: 'date range (min / max)', minLbl: 'min', maxLbl: 'max'
      }
    };
    let uiLang = 'he';
    const t = (k) => (DICT[uiLang][k] ?? k);

    /* ---------------- Theme (light / dark / auto) ---------------- */
    let themeMode = 'auto';
    const prefersDark = () => window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const resolveTheme = () => (themeMode === 'auto' ? (prefersDark() ? 'dark' : 'light') : themeMode);

    function applyTheme(mode) {
      themeMode = mode;
      try { localStorage.setItem('hdp-demo-theme', mode); } catch (e) { /* noop */ }
      document.documentElement.dataset.theme = resolveTheme();
      document.querySelectorAll('[data-theme-btn]').forEach((b) => b.classList.toggle('active', b.dataset.themeBtn === mode));
      const radio = document.querySelector(`input[name="theme"][value="${mode}"]`);
      if (radio) radio.checked = true;
      rebuild();
    }
    // Re-apply when the OS preference changes while in "auto".
    if (window.matchMedia) {
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
        if (themeMode === 'auto') applyTheme('auto');
      });
    }

    function applyLang(lang) {
      uiLang = lang;
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'en' ? 'ltr' : 'rtl';
      document.querySelectorAll('[data-i18n]').forEach((el) => { el.textContent = t(el.dataset.i18n); });
      document.querySelectorAll('[data-lang]').forEach((b) => b.classList.toggle('active', b.dataset.lang === lang));
      rebuild();
    }

    /* ---------------- Options ---------------- */
    const stageInner = document.getElementById('stageInner');
    const out = document.getElementById('out');
    const snippet = document.getElementById('snippet');
    const val = (n) => document.querySelector(`input[name="${n}"]:checked`).value;
    const chk = (id) => document.getElementById(id).checked;

    function options() {
      const o = {
        calendar: val('calendar'), mode: val('mode'), precision: val('precision'),
        size: val('size'), highlightHolidays: chk('highlightHolidays'),
        highlightShabbat: chk('highlightShabbat'), showParasha: chk('showParasha'),
        outsideDays: chk('outsideDays'), diaspora: chk('diaspora'), compact: chk('compact'),
        rounded: chk('rounded'), headerBorder: chk('headerBorder'),
        lang: uiLang, theme: resolveTheme(),
        time: chk('time'), seconds: chk('seconds'), timeFormat: val('timeFormat'), timeStyle: val('timeStyle'),
        displayCalendar: val('displayCalendar'), closeOnSelect: chk('closeOnSelect'),
        openOnInputClick: chk('openOnInputClick')
      };
      const minV = document.getElementById('minDate').value;
      const maxV = document.getElementById('maxDate').value;
      if (minV) o.min = minV;
      if (maxV) o.max = maxV;
      if (chk('usecolor')) o.primaryColor = document.getElementById('primaryColor').value;
      return o;
    }

    const p2 = (n) => String(n).padStart(2, '0');
    const fmtResult = (r) => 'iso' in r
      ? `iso: ${r.iso || '—'} · ${t('calWord')}: ${r.type}`
      : `${t('rangeWord')}: ${r.start || '—'} → ${r.end || '—'}`;

    // Format a single ISO date for the input, honoring displayCalendar + precision.
    function fmtInput(iso, opts) {
      if (!iso) return '';
      const d = parseISO(iso.split('T')[0]);
      if (!d) return '';
      const heb = opts.displayCalendar === 'hebrew';
      // When a time picker is on, show the time part too (HH:mm[:ss]).
      const tPart = opts.time && String(iso).includes('T')
        ? ' ' + String(iso).split('T')[1].slice(0, opts.seconds ? 8 : 5)
        : '';
      if (opts.precision === 'year') return heb ? hebYearGematriaFull(gregToHebParts(d).year) : String(d.getFullYear());
      if (opts.precision === 'month') return heb ? hebMonthYearLabel(d) : `${p2(d.getMonth() + 1)}/${d.getFullYear()}`;
      if (heb) return hebFullString(d) + tPart;
      return `${p2(d.getDate())}/${p2(d.getMonth() + 1)}/${d.getFullYear()}` + tPart;
    }
    // Parse a typed DD/MM/YYYY (gregorian) -> ISO, or '' if incomplete/invalid.
    function parseTyped(text) {
      const m = text.match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
      if (!m) return '';
      const [, dd, mm, yyyy] = m;
      const d = new Date(+yyyy, +mm - 1, +dd);
      if (d.getDate() !== +dd || d.getMonth() !== +mm - 1) return '';
      return toISO(d);
    }
    // Flexible Gregorian parse for PASTED text: DD/MM/YYYY, D.M.YYYY, YYYY-MM-DD…
    function parseGregFlexible(text) {
      text = String(text).trim();
      let m = text.match(/^(\d{1,2})[\/.\-](\d{1,2})[\/.\-](\d{4})$/);
      if (m) { const d = new Date(+m[3], +m[2] - 1, +m[1]); if (d.getDate() === +m[1] && d.getMonth() === +m[2] - 1) return toISO(d); }
      m = text.match(/^(\d{4})[\/.\-](\d{1,2})[\/.\-](\d{1,2})$/);
      if (m) { const d = new Date(+m[1], +m[2] - 1, +m[3]); if (d.getMonth() === +m[2] - 1 && d.getDate() === +m[3]) return toISO(d); }
      return '';
    }
    // A masked DD/MM/YYYY date (imask-style, but no underscores): auto-insert the
    // "/" separators and clamp out-of-range day/month as they're typed.
    function maskDigits(text) {
      const dg = text.replace(/\D/g, '').slice(0, 8);
      let day = dg.slice(0, 2), mon = dg.slice(2, 4), yr = dg.slice(4, 8);
      if (day.length === 2) day = String(Math.min(31, Math.max(1, +day))).padStart(2, '0');
      if (mon.length === 2) mon = String(Math.min(12, Math.max(1, +mon))).padStart(2, '0');
      let s = day;
      if (dg.length >= 2) s += '/' + mon;   // first "/" once the day is complete
      if (dg.length >= 4) s += '/' + yr;    // second "/" once the month is complete
      return s;
    }

    let picker = null;
    let currentValue = null; // string ISO (single) | { start, end } (range) | null

    function applyColor() {
      if (chk('usecolor')) {
        requestAnimationFrame(() => document.querySelector('.hdp-popup')?.style.setProperty('--hdp-primary', document.getElementById('primaryColor').value));
      }
    }

    function buildInput(opts) {
      const isRange = opts.mode === 'range';
      // Only a single Gregorian day is numerically editable; range / month /
      // year / Hebrew display are click-to-open only.
      const editable = opts.displayCalendar === 'gregorian' && opts.precision === 'day' && !isRange;

      const wrap = document.createElement('div');
      wrap.className = 'di-wrap';
      wrap.innerHTML =
        '<span class="di-cal"><svg class="hicon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></span>' +
        '<input class="di-input" type="text" inputmode="numeric" />' +
        '<button class="di-clear" type="button"></button>';
      const input = wrap.querySelector('.di-input');
      const clear = wrap.querySelector('.di-clear');
      const calIcon = wrap.querySelector('.di-cal');
      const gregDisplay = opts.displayCalendar === 'gregorian';
      // Does clicking the INPUT open the picker? Honored only for a Gregorian
      // display (Hebrew always opens); false = open only via the calendar icon.
      const openByInputClick = !gregDisplay || opts.openOnInputClick !== false;
      // Never readonly (so paste fires); non-editable inputs block typed chars.
      input.readOnly = false;
      input.placeholder = editable ? 'DD/MM/YYYY' : t('clickToPick');
      clear.title = t('clearTitle');
      clear.textContent = '✕';

      const hasVal = () => isRange ? !!(currentValue && (currentValue.start || currentValue.end)) : !!currentValue;
      const refresh = () => {
        if (isRange) {
          const v = currentValue || {};
          input.value = (v.start || v.end) ? `${fmtInput(v.start, opts)} – ${fmtInput(v.end, opts)}` : '';
        } else {
          input.value = fmtInput(currentValue, opts);
        }
        clear.classList.toggle('show', hasVal());
      };

      let isOpen = false; // guards against the double open→close→open flicker

      const open = () => {
        // A single click fires both `focus` and `click`; this guard stops the
        // popup being torn down and rebuilt (which caused a visible flicker).
        // On a 2nd click we do NOTHING here, so the browser's native click can
        // place the caret / selection inside the input for manual editing.
        if (isOpen) return;
        picker = new DatePicker({
          // Reopen on the previously-chosen value so the range (or date) is
          // shown and can be adjusted.
          ...opts, inline: false, value: currentValue || null,
          // NOTE: DatePicker.open() calls close() internally at its start, which
          // fires this onClose once — that's why we set `isOpen = true` only
          // AFTER .open() returns (below), so the flag ends up correct.
          onClose: () => { isOpen = false; },
          onSelect: (r) => {
            currentValue = 'iso' in r ? r.iso : { start: r.start, end: r.end };
            out.textContent = fmtResult(r);
            // While the user is actively typing a Gregorian date, don't clobber
            // the field from under the caret; otherwise mirror the selection.
            if (!(editable && document.activeElement === input)) refresh();
          }
        }).open(wrap);
        isOpen = true;
        applyColor();
        // NOTE: we intentionally do NOT refocus the input here. Opening leaves
        // focus on the calendar; the user must click the input again to edit it.
      };

      // The calendar icon always opens the picker.
      calIcon.addEventListener('click', (e) => { e.stopPropagation(); open(); });
      if (openByInputClick) {
        input.addEventListener('click', open);
        input.addEventListener('focus', open);
      }
      // Pasting a Gregorian date works in ANY display (even Hebrew): parse it and
      // show the result in the current calendar.
      input.addEventListener('paste', (e) => {
        const txt = (e.clipboardData || window.clipboardData)?.getData('text') || '';
        const iso = parseGregFlexible(txt);
        if (iso) {
          e.preventDefault();
          currentValue = iso;
          out.textContent = `iso: ${iso} (${t('pasted')})`;
          if (picker) picker.setValue(iso);
          refresh();
        }
      });
      // Non-editable inputs: allow click / paste / navigation, block typed chars.
      if (!editable) {
        input.addEventListener('keydown', (e) => {
          if (e.ctrlKey || e.metaKey || e.key.length !== 1) return;
          e.preventDefault();
        });
      }

      if (editable) {
        const commitTyped = () => {
          const iso = parseTyped(maskDigits(input.value));
          if (iso) {
            currentValue = iso;
            out.textContent = `iso: ${iso} (${t('typed')})`;
            if (picker) picker.setValue(iso); else open();
            return true;
          }
          return false;
        };
        input.addEventListener('input', () => {
          // Reformat while preserving the caret position (so selecting/replacing
          // digits mid-string doesn't jump the cursor to the end).
          const caret = input.selectionStart;
          const rawBefore = input.value;
          const masked = maskDigits(rawBefore);
          if (masked !== rawBefore) {
            const digitsBeforeCaret = rawBefore.slice(0, caret).replace(/\D/g, '').length;
            input.value = masked;
            // map digit index back to a string index in the masked value
            let idx = 0, seen = 0;
            while (idx < masked.length && seen < digitsBeforeCaret) { if (/\d/.test(masked[idx])) seen++; idx++; }
            try { input.setSelectionRange(idx, idx); } catch (e) { /* noop */ }
          }
          clear.classList.toggle('show', !!input.value);
          commitTyped();
        });
        // Enter commits whatever is typed (e.g. after select-all + retype).
        input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') { e.preventDefault(); if (commitTyped()) { refresh(); picker?.close(); } }
        });
        // On blur, normalize back to the canonical display.
        input.addEventListener('blur', () => setTimeout(refresh, 150));
      }

      clear.addEventListener('click', (e) => {
        e.stopPropagation();
        currentValue = null;
        out.textContent = '—';
        refresh();
        picker?.close();
      });

      refresh();
      return wrap;
    }

    // The controls column is capped to the viewport height and scrolls
    // internally (see the .controls CSS), so you can tweak props and watch the
    // result without scrolling the whole page.

    /* ---------------- Code snippet (per framework) ---------------- */
    const PKG = '@simplix-systems/hebrew-date-picker';
    const snippetLang = document.getElementById('snippetLang');
    const copyBtn = document.getElementById('copyBtn');
    let lastOpts = {}, lastIsInput = false;

    // Library defaults — props equal to these are omitted from the snippet.
    const DEF = {
      calendar: 'hebrew', mode: 'single', precision: 'day', size: 'md',
      highlightHolidays: true, highlightShabbat: true, showParasha: true,
      outsideDays: true, diaspora: false, compact: false, rounded: false,
      headerBorder: true, time: false, seconds: false, timeFormat: '24',
      timeStyle: 'native', displayCalendar: 'hebrew', closeOnSelect: true,
      openOnInputClick: true, lang: 'he', theme: 'light'
    };
    // Which props to surface, and only when they differ from the default.
    function activeProps() {
      const o = lastOpts;
      const keep = (k) => o[k] !== undefined && o[k] !== '' && o[k] !== DEF[k];
      const order = ['calendar','mode','precision','size','theme','lang','displayCalendar',
        'min','max','rounded','headerBorder','highlightHolidays','highlightShabbat','showParasha',
        'outsideDays','diaspora','compact','time','seconds','timeFormat','timeStyle',
        'closeOnSelect','openOnInputClick','primaryColor'];
      // input-only props are dropped for the inline demo
      return order.filter(k => keep(k) && !(['displayCalendar','openOnInputClick'].includes(k) && !lastIsInput))
                  .map(k => [k, o[k]]);
    }
    const kebab = (k) => k.replace(/[A-Z]/g, (m) => '-' + m.toLowerCase());
    const jsVal = (v) => typeof v === 'string' ? `'${v}'` : String(v);

    const SNIPPETS = {
      core(props, isInput) {
        const body = props.map(([k, v]) => `  ${k}: ${jsVal(v)},`).join('\n');
        return `import { DatePicker } from '${PKG}';\nimport '${PKG}/style.css';\n\n`
          + `new DatePicker({\n${body}${body ? '\n' : ''}  onSelect: (r) => { /* … */ },\n})`
          + `.${isInput ? 'open(inputEl)' : 'mount(el)'};`;
      },
      vue(props) {
        const attrs = props.map(([k, v]) => typeof v === 'string' ? `  ${k}="${v}"`
          : v === true ? `  ${k}` : `  :${k}="${v}"`).join('\n');
        return `<script setup>\nimport { HebrewDatePicker } from '${PKG}/vue';\nimport '${PKG}/style.css';\nconst value = ref(null);\n</` + `script>\n\n`
          + `<template>\n  <HebrewDatePicker\n    v-model="value"\n${attrs.replace(/^  /gm, '    ')}\n    @change="(r) => {}"\n  />\n</template>`;
      },
      react(props) {
        const attrs = props.map(([k, v]) => typeof v === 'string' ? `  ${k}="${v}"`
          : v === true ? `  ${k}` : `  ${k}={${v}}`).join('\n');
        return `import { HebrewDatePicker } from '${PKG}/react';\nimport '${PKG}/style.css';\n\n`
          + `<HebrewDatePicker\n  value={value}\n  onChange={(v, r) => {}}\n${attrs}\n/>`;
      },
      svelte(props) {
        const attrs = props.map(([k, v]) => typeof v === 'string' ? `${k}="${v}"`
          : v === true ? `${k}` : `${k}={${v}}`).join(' ');
        return `<script>\n  import { HebrewDatePicker } from '${PKG}/svelte';\n  import '${PKG}/style.css';\n  let value;\n</` + `script>\n\n`
          + `<HebrewDatePicker bind:value ${attrs} on:change={(e) => {}} />`;
      },
      angular(props) {
        const attrs = props.map(([k, v]) => typeof v === 'string' ? `  ${k}="${v}"`
          : `  [${k}]="${v}"`).join('\n');
        return `<!-- import HebrewDatePickerComponent from '${PKG}/angular' -->\n`
          + `<hebrew-date-picker\n  [(value)]="value"\n${attrs}\n  (change)="onChange($event)"\n></hebrew-date-picker>`;
      },
      webcomponent(props) {
        const attrs = props.map(([k, v]) => typeof v === 'string' ? `  ${kebab(k)}="${v}"`
          : v === true ? `  ${kebab(k)}` : `  ${kebab(k)}="${v}"`).join('\n');
        return `<script type="module">\n  import '${PKG}/webcomponent';\n  import '${PKG}/style.css';\n</` + `script>\n\n`
          + `<hebrew-date-picker\n${attrs}\n></hebrew-date-picker>`;
      },
      filament(props) {
        const o = Object.fromEntries(props);
        const lines = [];
        if (o.calendar) lines.push(`->calendar('${o.calendar}')`);
        if (o.mode === 'range') lines.push('->range()');
        if (o.precision === 'month') lines.push('->monthOnly()');
        if (o.precision === 'year') lines.push('->yearOnly()');
        if (o.time) lines.push('->time()');
        if (o.seconds) lines.push('->seconds()');
        if (o.timeFormat) lines.push(`->timeFormat('${o.timeFormat}')`);
        if (o.timeStyle) lines.push(`->timeStyle('${o.timeStyle}')`);
        if (o.diaspora) lines.push('->diaspora()');
        if (o.outsideDays) lines.push('->outsideDays()');
        if ('rounded' in o) lines.push(`->rounded(${o.rounded ? '' : 'false'})`);
        if ('headerBorder' in o) lines.push(`->headerBorder(${o.headerBorder ? '' : 'false'})`);
        if (o.highlightHolidays === false) lines.push('->holidays(false)');
        if (o.highlightShabbat === false) lines.push('->shabbat(false)');
        if (o.showParasha === false) lines.push('->parasha(false)');
        if (o.compact) lines.push('->compact()');
        if (o.size) lines.push(`->size('${o.size}')`);
        if (o.min) lines.push(`->minDate('${o.min}')`);
        if (o.max) lines.push(`->maxDate('${o.max}')`);
        if (o.closeOnSelect === false) lines.push('->closeOnSelect(false)');
        if (o.openOnInputClick === false) lines.push('->openOnInputClick(false)');
        if (o.primaryColor) lines.push(`->primaryColor('${o.primaryColor}')`);
        if (o.lang) lines.push(`->lang('${o.lang}')`);
        const chain = lines.map(l => '    ' + l).join('\n');
        return `use SimplixSystems\\HebrewDatePicker\\Forms\\Components\\HebrewDatePicker;\n\n`
          + `HebrewDatePicker::make('date')\n${chain}${chain ? '\n' : ''}    ->label('תאריך');`;
      }
    };

    function renderSnippet() {
      const lang = snippetLang.value;
      snippet.textContent = SNIPPETS[lang](activeProps(), lastIsInput);
    }

    function rebuild() {
      const opts = options();
      picker?.destroy?.();
      picker?.close?.();
      stageInner.innerHTML = '';
      currentValue = null;
      out.textContent = '—';

      if (chk('showInput')) {
        stageInner.appendChild(buildInput(opts));
      } else {
        picker = new DatePicker({
          ...opts, inline: true,
          value: opts.mode === 'range' ? null : new Date().toISOString().slice(0, 10),
          onSelect: (r) => { out.textContent = fmtResult(r); }
        }).mount(stageInner);
      }

      lastOpts = opts;
      lastIsInput = chk('showInput');
      renderSnippet();
    }

    document.querySelectorAll('.controls input:not([name="theme"])').forEach((el) => el.addEventListener('change', rebuild));
    document.querySelectorAll('input[name="theme"]').forEach((r) => r.addEventListener('change', () => applyTheme(r.value)));
    document.querySelectorAll('[data-lang]').forEach((b) => b.addEventListener('click', () => applyLang(b.dataset.lang)));
    document.querySelectorAll('[data-theme-btn]').forEach((b) => b.addEventListener('click', () => applyTheme(b.dataset.themeBtn)));
    snippetLang.addEventListener('change', renderSnippet);
    copyBtn.addEventListener('click', async () => {
      try {
        await navigator.clipboard.writeText(snippet.textContent);
        copyBtn.textContent = t('copied'); copyBtn.classList.add('copied');
        setTimeout(() => { copyBtn.textContent = t('copy'); copyBtn.classList.remove('copied'); }, 1400);
      } catch (e) { /* clipboard blocked */ }
    });
    let savedTheme = 'auto';
    try { savedTheme = localStorage.getItem('hdp-demo-theme') || 'auto'; } catch (e) { /* noop */ }
    applyTheme(savedTheme);
    applyLang('he');
  </script>
</body>
</html>
