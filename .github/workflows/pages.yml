name: Deploy demo to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer runs cancel in-progress ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Build bundles
        run: npm run build
      - name: Assemble site
        run: |
          mkdir -p _site/dist _site/examples
          cp -r dist/. _site/dist/
          cp -r examples/. _site/examples/
          # Landing page redirects to the playground (which references ../dist).
          cat > _site/index.html <<'HTML'
          <!doctype html><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=./examples/demo.html">
          <title>Hebrew Date Picker</title>
          <a href="./examples/demo.html">Open the Hebrew Date Picker playground →</a>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
