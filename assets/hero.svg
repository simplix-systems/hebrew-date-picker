<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="'Segoe UI',system-ui,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4c5fd8"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1000" height="440" rx="26" fill="url(#bg)"/>

  <!-- Left: brand + features -->
  <g transform="translate(56,70)">
    <g fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="2" width="34" height="34" rx="7"/>
      <path d="M25 -3v10M9 -3v10M0 14h34"/>
    </g>
    <text x="46" y="30" fill="#fff" font-size="34" font-weight="800" letter-spacing="-0.5">Hebrew Date Picker</text>
    <text x="2" y="66" fill="#e7e9fb" font-size="16.5" font-weight="500">Dual Hebrew &amp; Gregorian calendar · zero runtime deps</text>

    <!-- feature pills -->
    <g font-size="13.5" font-weight="600" fill="#fff">
      <g transform="translate(0,92)">
        <rect x="0" y="0" width="118" height="30" rx="15" fill="#ffffff22"/><text x="59" y="20" text-anchor="middle">Holidays</text>
        <rect x="128" y="0" width="176" height="30" rx="15" fill="#ffffff22"/><text x="216" y="20" text-anchor="middle">Parashat HaShavua</text>
        <rect x="314" y="0" width="86" height="30" rx="15" fill="#ffffff22"/><text x="357" y="20" text-anchor="middle">Range</text>
      </g>
      <g transform="translate(0,130)">
        <rect x="0" y="0" width="150" height="30" rx="15" fill="#ffffff22"/><text x="75" y="20" text-anchor="middle">Time · Day/Mo/Yr</text>
        <rect x="160" y="0" width="118" height="30" rx="15" fill="#ffffff22"/><text x="219" y="20" text-anchor="middle">Dark mode</text>
        <rect x="288" y="0" width="62" height="30" rx="15" fill="#ffffff22"/><text x="319" y="20" text-anchor="middle">RTL</text>
      </g>
    </g>

    <!-- frameworks -->
    <text x="2" y="196" fill="#dfe2fb" font-size="13.5" font-weight="600" letter-spacing="0.3">Vue · React · Svelte · Angular · Web Component · Filament</text>

    <!-- install -->
    <g transform="translate(0,214)">
      <rect x="0" y="0" width="404" height="38" rx="9" fill="#0b1020" opacity="0.55"/>
      <text x="16" y="24" fill="#c7d2fe" font-size="14.5" font-family="ui-monospace,Menlo,Consolas,monospace">npm i @simplix-systems/hebrew-date-picker</text>
    </g>
  </g>

  <!-- Right: picker card mockup -->
  <g transform="translate(590,44)" filter="url(#sh)">
    <rect width="368" height="352" rx="18" fill="#ffffff"/>

    <!-- tabs -->
    <text x="120" y="42" text-anchor="middle" fill="#111827" font-size="15" font-weight="700" direction="rtl">עברי</text>
    <rect x="72" y="52" width="96" height="3" rx="1.5" fill="#4c5fd8"/>
    <text x="264" y="42" text-anchor="middle" fill="#9ca3af" font-size="15" font-weight="600" direction="rtl">לועזי</text>
    <line x1="0" y1="55" x2="368" y2="55" stroke="#eef1f7"/>

    <!-- header: nav + month/year pills -->
    <g transform="translate(0,72)" fill="#111827">
      <rect x="24" y="0" width="66" height="30" rx="7" fill="#fff" stroke="#e5e7eb"/><text x="57" y="20" text-anchor="middle" font-size="14.5" font-weight="700" direction="rtl">תמוז</text>
      <rect x="98" y="0" width="70" height="30" rx="7" fill="#fff" stroke="#e5e7eb"/><text x="133" y="20" text-anchor="middle" font-size="14.5" font-weight="700" direction="rtl">תשפ״ו</text>
      <g fill="none" stroke="#6b7280" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M300 8l6 7-6 7"/><path d="M330 8l6 7-6 7"/>
        <path d="M60 8l-6 7 6 7" transform="translate(-30,0)"/>
      </g>
    </g>

    <!-- weekday row (RTL: Sun on the right) -->
    <g transform="translate(0,120)" fill="#9ca3af" font-size="12.5" font-weight="600" text-anchor="middle">
      <text x="336" y="0">א</text><text x="288" y="0">ב</text><text x="240" y="0">ג</text>
      <text x="192" y="0">ד</text><text x="144" y="0">ה</text><text x="96" y="0">ו</text><text x="48" y="0">ש</text>
    </g>

    <!-- day grid (5 rows). Selected: כ״ג/8. Holiday dots on two cells. -->
    <g transform="translate(24,134)">
      <!-- row 1 (outside days greyed) -->
      <g font-weight="700" text-anchor="middle">
        <g transform="translate(288,0)"><text x="24" y="24" font-size="14" fill="#c7c9d1">ל׳</text><text x="24" y="38" font-size="10" fill="#c7c9d1">15</text><circle cx="38" cy="8" r="2.6" fill="#c026d3"/></g>
        <g transform="translate(240,0)"><text x="24" y="24" font-size="14" fill="#111827">א׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">16</text><circle cx="38" cy="8" r="2.6" fill="#c026d3"/></g>
        <g transform="translate(192,0)"><text x="24" y="24" font-size="14" fill="#111827">ב׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">17</text></g>
        <g transform="translate(144,0)"><text x="24" y="24" font-size="14" fill="#111827">ג׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">18</text></g>
        <g transform="translate(96,0)"><text x="24" y="24" font-size="14" fill="#111827">ד׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">19</text></g>
        <g transform="translate(48,0)"><text x="24" y="24" font-size="14" fill="#111827">ה׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">20</text></g>
        <g transform="translate(0,0)"><text x="24" y="24" font-size="14" fill="#111827">ו׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">21</text></g>
        <rect x="312" y="4" width="20" height="20" rx="10" fill="none" stroke="#f59e0b" stroke-width="2"/>
      </g>
      <!-- row 2 -->
      <g transform="translate(0,44)" font-weight="700" text-anchor="middle" font-size="14" fill="#111827">
        <g transform="translate(288,0)"><text x="24" y="24">ז׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">22</text></g>
        <g transform="translate(240,0)"><text x="24" y="24">ח׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">23</text></g>
        <g transform="translate(192,0)"><text x="24" y="24">ט׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">24</text></g>
        <g transform="translate(144,0)"><text x="24" y="24">י׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">25</text></g>
        <g transform="translate(96,0)"><text x="24" y="24">י״א</text><text x="24" y="38" font-size="10" fill="#9ca3af">26</text></g>
        <g transform="translate(48,0)"><text x="24" y="24">י״ב</text><text x="24" y="38" font-size="10" fill="#9ca3af">27</text></g>
        <g transform="translate(0,0)"><text x="24" y="24">י״ג</text><text x="24" y="38" font-size="10" fill="#9ca3af">28</text></g>
      </g>
      <!-- row 3 (selected כ״ג / 8) -->
      <g transform="translate(0,88)" font-weight="700" text-anchor="middle" font-size="14" fill="#111827">
        <g transform="translate(288,0)"><text x="24" y="24">י״ד</text><text x="24" y="38" font-size="10" fill="#9ca3af">29</text></g>
        <g transform="translate(240,0)"><text x="24" y="24">ט״ו</text><text x="24" y="38" font-size="10" fill="#9ca3af">30</text></g>
        <g transform="translate(192,0)"><text x="24" y="24">ט״ז</text><text x="24" y="38" font-size="10" fill="#9ca3af">1</text></g>
        <g transform="translate(144,0)"><text x="24" y="24">י״ז</text><text x="24" y="38" font-size="10" fill="#9ca3af">2</text></g>
        <g transform="translate(96,0)"><rect x="4" y="2" width="40" height="40" rx="9" fill="#4c5fd8"/><text x="24" y="24" fill="#fff">כ״ג</text><text x="24" y="38" font-size="10" fill="#ffffffbf">8</text></g>
        <g transform="translate(48,0)"><text x="24" y="24">י״ט</text><text x="24" y="38" font-size="10" fill="#9ca3af">4</text></g>
        <g transform="translate(0,0)"><text x="24" y="24">כ׳</text><text x="24" y="38" font-size="10" fill="#9ca3af">5</text></g>
      </g>
      <!-- row 4 -->
      <g transform="translate(0,132)" font-weight="700" text-anchor="middle" font-size="14" fill="#111827">
        <g transform="translate(288,0)"><text x="24" y="24">כ״א</text><text x="24" y="38" font-size="10" fill="#9ca3af">6</text></g>
        <g transform="translate(240,0)"><text x="24" y="24">כ״ב</text><text x="24" y="38" font-size="10" fill="#9ca3af">7</text></g>
        <g transform="translate(192,0)"><text x="24" y="24">כ״ד</text><text x="24" y="38" font-size="10" fill="#9ca3af">9</text></g>
        <g transform="translate(144,0)"><text x="24" y="24">כ״ה</text><text x="24" y="38" font-size="10" fill="#9ca3af">10</text></g>
        <g transform="translate(96,0)"><text x="24" y="24">כ״ו</text><text x="24" y="38" font-size="10" fill="#9ca3af">11</text></g>
        <g transform="translate(48,0)"><text x="24" y="24">כ״ז</text><text x="24" y="38" font-size="10" fill="#9ca3af">12</text></g>
        <g transform="translate(0,0)"><text x="24" y="24">כ״ח</text><text x="24" y="38" font-size="10" fill="#9ca3af">13</text></g>
      </g>
    </g>
  </g>
</svg>
