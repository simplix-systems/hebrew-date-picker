<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="'Segoe UI',system-ui,Arial,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4c5fd8"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#0b1020" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1000" height="440" rx="26" fill="url(#bg)"/>

  <!-- Left: brand + features -->
  <g transform="translate(56,70)">
    <g fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="2" width="34" height="34" rx="7"/>
      <path d="M25 -3v10M9 -3v10M0 14h34"/>
    </g>
    <text x="46" y="30" fill="#fff" font-size="34" font-weight="800" letter-spacing="-0.5">Hebrew Date Picker</text>
    <text x="2" y="66" fill="#e7e9fb" font-size="16.5" font-weight="500">Dual Hebrew &amp; Gregorian calendar · zero runtime deps</text>

    <!-- feature pills -->
    <g font-size="13.5" font-weight="600" fill="#fff">
      <g transform="translate(0,92)">
        <rect x="0" y="0" width="118" height="30" rx="15" fill="#ffffff22"/><text x="59" y="20" text-anchor="middle">Holidays</text>
        <rect x="128" y="0" width="176" height="30" rx="15" fill="#ffffff22"/><text x="216" y="20" text-anchor="middle">Parashat HaShavua</text>
        <rect x="314" y="0" width="86" height="30" rx="15" fill="#ffffff22"/><text x="357" y="20" text-anchor="middle">Range</text>
      </g>
      <g transform="translate(0,130)">
        <rect x="0" y="0" width="150" height="30" rx="15" fill="#ffffff22"/><text x="75" y="20" text-anchor="middle">Time · Day/Mo/Yr</text>
        <rect x="160" y="0" width="118" height="30" rx="15" fill="#ffffff22"/><text x="219" y="20" text-anchor="middle">Dark mode</text>
        <rect x="288" y="0" width="62" height="30" rx="15" fill="#ffffff22"/><text x="319" y="20" text-anchor="middle">RTL</text>
      </g>
    </g>

    <!-- frameworks -->
    <text x="2" y="196" fill="#dfe2fb" font-size="13.5" font-weight="600" letter-spacing="0.3">Vue · React · Svelte · Angular · Web Component · Filament</text>

    <!-- install -->
    <g transform="translate(0,214)">
      <rect x="0" y="0" width="404" height="38" rx="9" fill="#0b1020" opacity="0.55"/>
      <text x="16" y="24" fill="#c7d2fe" font-size="14.5" font-family="ui-monospace,Menlo,Consolas,monospace">npm i @simplix-systems/hebrew-date-picker</text>
    </g>
  </g>

  <!-- Right: picker card mockup -->
  <g transform="translate(590,44)" filter="url(#sh)">
    <rect width="368" height="352" rx="18" fill="#ffffff"/>

    <!-- tabs -->
    <text x="120" y="42" text-anchor="middle" fill="#111827" font-size="15" font-weight="700" direction="rtl">עברי</text>
    <rect x="72" y="52" width="96" height="3" rx="1.5" fill="#4c5fd8"/>
    <text x="264" y="42" text-anchor="middle" fill="#9ca3af" font-size="15" font-weight="600" direction="rtl">לועזי</text>
    <line x1="0" y1="55" x2="368" y2="55" stroke="#eef1f7"/>

    <!-- header: centered month/year pills flanked by nav arrows -->
    <g transform="translate(0,72)">
      <rect x="116" y="0" width="60" height="30" rx="7" fill="#fff" stroke="#e5e7eb"/><text x="146" y="20" text-anchor="middle" font-size="14.5" font-weight="700" fill="#111827" direction="rtl">ניסן</text>
      <rect x="184" y="0" width="66" height="30" rx="7" fill="#fff" stroke="#e5e7eb"/><text x="217" y="20" text-anchor="middle" font-size="14.5" font-weight="700" fill="#111827" direction="rtl">תשפ״ה</text>
      <g fill="none" stroke="#9ca3af" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <!-- left: « ‹ -->
        <path d="M28 8l-6 7 6 7"/><path d="M38 8l-6 7 6 7"/><path d="M62 8l-6 7 6 7"/>
        <!-- right: › » -->
        <path d="M306 8l6 7-6 7"/><path d="M330 8l6 7-6 7"/><path d="M340 8l6 7-6 7"/>
      </g>
    </g>

    <!-- weekday row (RTL: Sun on the right) -->
    <g transform="translate(0,120)" fill="#9ca3af" font-size="12.5" font-weight="600" text-anchor="middle">
      <text x="336" y="0">א</text><text x="288" y="0">ב</text><text x="240" y="0">ג</text>
      <text x="192" y="0">ד</text><text x="144" y="0">ה</text><text x="96" y="0">ו</text><text x="48" y="0">ש</text>
    </g>

    <!-- day grid — REAL month (Nisan 5785 / ניסן תשפ״ה): Pesach (magenta),
         Chol HaMoed, Shabbatot (amber), Rosh Chodesh dots; selected day י׳. -->
    <g transform="translate(24,132)" text-anchor="middle" font-weight="700">
      <circle cx="312" cy="18" r="18" fill="#f4f5f8"/><circle cx="264" cy="18" r="18" fill="#f4f5f8"/><circle cx="216" cy="18" r="18" fill="#f4f5f8"/><circle cx="168" cy="18" r="18" fill="#f4f5f8"/><circle cx="120" cy="18" r="18" fill="#f4f5f8"/><circle cx="72" cy="18" r="18" fill="#f4f5f8"/><circle cx="24" cy="18" r="18" fill="#fef3c7"/><circle cx="312" cy="60" r="18" fill="#f4f5f8"/><circle cx="264" cy="60" r="18" fill="#f4f5f8"/><circle cx="216" cy="60" r="18" fill="#4c5fd8"/><circle cx="168" cy="60" r="18" fill="#f4f5f8"/><circle cx="120" cy="60" r="18" fill="#f4f5f8"/><circle cx="72" cy="60" r="18" fill="#f4f5f8"/><circle cx="24" cy="60" r="18" fill="#fef3c7"/><circle cx="312" cy="102" r="18" fill="#f9d9ef"/><circle cx="264" cy="102" r="18" fill="#fbeaf6"/><circle cx="216" cy="102" r="18" fill="#fbeaf6"/><circle cx="168" cy="102" r="18" fill="#fbeaf6"/><circle cx="120" cy="102" r="18" fill="#fbeaf6"/><circle cx="72" cy="102" r="18" fill="#fbeaf6"/><circle cx="24" cy="102" r="18" fill="#f9d9ef"/><circle cx="312" cy="144" r="18" fill="#f4f5f8"/><circle cx="264" cy="144" r="18" fill="#f4f5f8"/><circle cx="216" cy="144" r="18" fill="#f4f5f8"/><circle cx="168" cy="144" r="18" fill="#f4f5f8"/><circle cx="120" cy="144" r="18" fill="#f4f5f8"/><circle cx="72" cy="144" r="18" fill="#f4f5f8"/><circle cx="24" cy="144" r="18" fill="#fef3c7"/><circle cx="312" cy="186" r="18" fill="#f4f5f8"/><circle cx="264" cy="186" r="18" fill="#f4f5f8"/>
      <circle cx="325" cy="6" r="2.6" fill="#c026d3"/><circle cx="325" cy="90" r="2.6" fill="#c026d3"/><circle cx="37" cy="90" r="2.6" fill="#c026d3"/><circle cx="277" cy="174" r="2.6" fill="#c026d3"/>
      <g font-size="13.5"><text x="312" y="16" fill="#111827">א׳</text><text x="264" y="16" fill="#111827">ב׳</text><text x="216" y="16" fill="#111827">ג׳</text><text x="168" y="16" fill="#111827">ד׳</text><text x="120" y="16" fill="#111827">ה׳</text><text x="72" y="16" fill="#111827">ו׳</text><text x="24" y="16" fill="#111827">ז׳</text><text x="312" y="58" fill="#111827">ח׳</text><text x="264" y="58" fill="#111827">ט׳</text><text x="216" y="58" fill="#ffffff">י׳</text><text x="168" y="58" fill="#111827">י״א</text><text x="120" y="58" fill="#111827">י״ב</text><text x="72" y="58" fill="#111827">י״ג</text><text x="24" y="58" fill="#111827">י״ד</text><text x="312" y="100" fill="#c026d3">ט״ו</text><text x="264" y="100" fill="#b3288f">ט״ז</text><text x="216" y="100" fill="#b3288f">י״ז</text><text x="168" y="100" fill="#b3288f">י״ח</text><text x="120" y="100" fill="#b3288f">י״ט</text><text x="72" y="100" fill="#b3288f">כ׳</text><text x="24" y="100" fill="#c026d3">כ״א</text><text x="312" y="142" fill="#111827">כ״ב</text><text x="264" y="142" fill="#111827">כ״ג</text><text x="216" y="142" fill="#111827">כ״ד</text><text x="168" y="142" fill="#111827">כ״ה</text><text x="120" y="142" fill="#111827">כ״ו</text><text x="72" y="142" fill="#111827">כ״ז</text><text x="24" y="142" fill="#111827">כ״ח</text><text x="312" y="184" fill="#111827">כ״ט</text><text x="264" y="184" fill="#111827">ל׳</text></g>
      <g font-size="9"><text x="312" y="27" fill="#9ca3af">30</text><text x="264" y="27" fill="#9ca3af">31</text><text x="216" y="27" fill="#9ca3af">1</text><text x="168" y="27" fill="#9ca3af">2</text><text x="120" y="27" fill="#9ca3af">3</text><text x="72" y="27" fill="#9ca3af">4</text><text x="24" y="27" fill="#9ca3af">5</text><text x="312" y="69" fill="#9ca3af">6</text><text x="264" y="69" fill="#9ca3af">7</text><text x="216" y="69" fill="#ffffffbf">8</text><text x="168" y="69" fill="#9ca3af">9</text><text x="120" y="69" fill="#9ca3af">10</text><text x="72" y="69" fill="#9ca3af">11</text><text x="24" y="69" fill="#9ca3af">12</text><text x="312" y="111" fill="#d19bc9">13</text><text x="264" y="111" fill="#cba3c2">14</text><text x="216" y="111" fill="#cba3c2">15</text><text x="168" y="111" fill="#cba3c2">16</text><text x="120" y="111" fill="#cba3c2">17</text><text x="72" y="111" fill="#cba3c2">18</text><text x="24" y="111" fill="#d19bc9">19</text><text x="312" y="153" fill="#9ca3af">20</text><text x="264" y="153" fill="#9ca3af">21</text><text x="216" y="153" fill="#9ca3af">22</text><text x="168" y="153" fill="#9ca3af">23</text><text x="120" y="153" fill="#9ca3af">24</text><text x="72" y="153" fill="#9ca3af">25</text><text x="24" y="153" fill="#9ca3af">26</text><text x="312" y="195" fill="#9ca3af">27</text><text x="264" y="195" fill="#9ca3af">28</text></g>
    </g>
  </g>
</svg>
